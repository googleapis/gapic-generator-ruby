permissions:
  contents: read

name: Tag Generator Release
on:
  push:
    branches: [main]
    paths: 'gapic-generator/**'
  workflow_dispatch:
    inputs:
      args:
        description: "Extra command line arguments."
        required: false

jobs:
  github-release:
    if: ${{ github.repository == 'googleapis/gapic-generator-ruby' }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Ruby 3.4
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: "3.4"
      - name: Install tools
        run: "gem install --no-document toys"
      - name: Execute
        shell: bash
        run: |
          toys release tag-generators -v --remote=origin ${GITHUB_EVENT_INPUTS_ARGS}
        env:
          GITHUB_EVENT_INPUTS_ARGS: ${{ github.event.inputs.args }}
