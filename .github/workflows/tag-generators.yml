name: Tag Generator Release
on:
  push:
    branches: [main]
    paths: 'gapic-generator/**'
  workflow_dispatch:
    inputs:
      args:
        description: "Extra command line arguments."
        required: false

jobs:
  github-release:
    if: ${{ github.repository == 'googleapis/gapic-generator-ruby' }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.YOSHI_CODE_BOT_TOKEN }}
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.YOSHI_CODE_BOT_TOKEN }}
          persist-credentials: false
      - name: Install Ruby 3.4
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "3.4"
      - name: Install tools
        run: "gem install --no-document toys"
      - name: Execute
        shell: bash
        run: |
          toys release tag-generators -v --remote=origin ${GITHUB_EVENT_INPUTS_ARGS}
        env:
          GITHUB_EVENT_INPUTS_ARGS: ${{ github.event.inputs.args }}
