permissions:
  contents: read

name: Tag Generator Release
on:
  push:
    branches: [main]
    paths: 'gapic-generator/**'
  workflow_dispatch:
    inputs:
      args:
        description: "Extra command line arguments."
        required: false

jobs:
  github-release:
    if: ${{ github.repository == 'googleapis/gapic-generator-ruby' }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.YOSHI_CODE_BOT_TOKEN }}
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repo
        # zizmor: ignore[artipacked] - checkout v6 persists credentials safely in RUNNER_TEMP
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.YOSHI_CODE_BOT_TOKEN }}
      - name: Install Ruby 3.4
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: "3.4"
      - name: Install tools
        run: "gem install --no-document toys"
      - name: Execute
        shell: bash
        run: |
          toys release tag-generators -v --remote=origin ${GITHUB_EVENT_INPUTS_ARGS}
        env:
          GITHUB_EVENT_INPUTS_ARGS: ${{ github.event.inputs.args }}
